name: Node.js CI Pipeline

on:
  push:
    branches: [master]
    
  pull_request: 
    branches: [master]

jobs:
  build:
    name: Build on EC2 via SSM
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::399894608127:role/github-actions-ssm
          aws-region: ap-south-1

      - name: Run Build via SSM
        run: |
          # Consider running these commands in a temporary directory on the server
          # if you want to avoid breaking the live application during the test phase.
          # For now, it runs in the main project directory.
          
          # Fetch the first instance ID matching the tag
          INSTANCE_ID=$(aws ssm describe-instance-information \
            --filters "Key=tag:purpose,Values=abacus-task-1" \
            --query "InstanceInformationList[0].InstanceId" \
            --output text)

          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Error: No instance found with the specified tag."
            exit 1
          fi

          echo "Targeting Instance: $INSTANCE_ID"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["cd /var/abacus-projects/simple-react-full-stack","git pull origin master","npm install","npm run build"]}' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          echo "Status: $STATUS"
          echo "----- OUTPUT -----"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text

          if [ "$STATUS" != "Success" ]; then
            echo "----- ERROR OUTPUT -----"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

