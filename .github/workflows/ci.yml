  deploy:
    name: Deploy on EC2 via SSM
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::399894608127:role/github-actions-ssm
          aws-region: ap-south-1

      - name: Run Deployment via SSM
        run: |
          # Since the build and test already happened in the previous stages,
          # you only need to run your deployment/restart command here.
          # Change "pm2 restart all" to whatever command starts your Node app.

          # Fetch all instance IDs matching the tag
          INSTANCE_IDS=$(aws ssm describe-instance-information \
            --filters "Key=tag:purpose,Values=abacus-task-1" \
            --query "InstanceInformationList[*].InstanceId" \
            --output text)

          if [ "$INSTANCE_IDS" == "None" ] || [ -z "$INSTANCE_IDS" ]; then
            echo "Error: No instances found with the specified tag."
            exit 1
          fi

          echo "Targeting Instances: $INSTANCE_IDS"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_IDS \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["cd /var/abacus-projects/simple-react-full-stack","pm2 restart node-app-1"]}' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          HAS_ERROR=0

          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "=========================================="
            echo "Checking Instance: $INSTANCE_ID"

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || true

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)

            echo "Status: $STATUS"
            echo "----- OUTPUT -----"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardOutputContent" \
              --output text

            if [ "$STATUS" != "Success" ]; then
              echo "----- ERROR OUTPUT -----"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              HAS_ERROR=1
            fi
          done

          if [ "$HAS_ERROR" -ne 0 ]; then
            echo "Deployment failed on one or more instances."
            exit 1
          fi